<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ed's Tic-Tac-Toe</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
            margin-top: 50px;
        }
        #gameBoard {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 5px;
        }
        .cell {
            width: 100px;
            height: 100px;
            background-color: lightgray;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            cursor: pointer;
        }
        #result {
            font-size: 2em;
            margin-top: 20px;
            color: green;
        }
    </style>
</head>
<body>
    <h1>Ed's Tic-Tac-Toe</h1>
    <div id="gameBoard">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>
    <div id="result"></div>
    <script>
        const cells = document.querySelectorAll('.cell');
        const resultDisplay = document.getElementById('result');
        let playerX = prompt("Enter the name for Player X:");
        let playerO = prompt("Enter the name for Player O:");
        let currentPlayer = 'X';
        let gameState = ['', '', '', '', '', '', '', '', ''];
        let gameActive = true;

        const winningConditions = [
            [0, 1, 2],
            [3, 4, 5],
            [6, 7, 8],
            [0, 3, 6],
            [1, 4, 7],
            [2, 5, 8],
            [0, 4, 8],
            [2, 4, 6]
        ];

        function handleCellClick(event) {
            const clickedCell = event.target;
            const clickedIndex = clickedCell.getAttribute('data-index');

            if (gameState[clickedIndex] !== '' || !gameActive) {
                return;
            }

            gameState[clickedIndex] = currentPlayer;
            clickedCell.innerText = currentPlayer;

            checkResult();
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
        }

        function checkResult() {
            let roundWon = false;
            for (let i = 0; i < winningConditions.length; i++) {
                const [a, b, c] = winningConditions[i];
                if (gameState[a] === '' || gameState[b] === '' || gameState[c] === '') {
                    continue;
                }
                if (gameState[a] === gameState[b] && gameState[a] === gameState[c]) {
                    roundWon = true;
                    break;
                }
            }

            if (roundWon) {
                resultDisplay.innerText = `Player ${currentPlayer === 'X' ? playerX : playerO} WINS!`;
                gameActive = false;
                return;
            }

            if (!gameState.includes('')) {
                resultDisplay.innerText = "It's a DRAW!";
                gameActive = false;
            }
        }

        cells.forEach(cell => cell.addEventListener('click', handleCellClick));
    </script>
</body>
</html>
